<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StepUp | Pro Pedometer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Step<span>Up</span></h1>
            <p>Keep Moving, Stay Healthy</p>
        </header>

        <div class="stats-circle">
            <div class="inner-circle">
                <span id="step-count">0</span>
                <p>Steps</p>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <small>Distance</small>
                <p><span id="distance">0.00</span> km</p>
            </div>
            <div class="info-card">
                <small>Calories</small>
                <p><span id="calories">0</span> kcal</p>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" class="btn-primary">Start Tracking</button>
            <button id="reset-btn" class="btn-secondary">Reset</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
